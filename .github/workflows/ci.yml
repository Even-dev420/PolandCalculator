name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Настраиваем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      
      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint unittest-xml-reporting
      
      # 4. Запускаем линтер (pylint)
      - name: Run Pylint
        run: |
          python -m pylint main.py test.py --exit-zero || true
      
      # 5. Запускаем тесты (unittest)
      - name: Run Tests
        run: |
          python -m unittest discover -v
      
      # 6. Публикуем результаты тестов
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/